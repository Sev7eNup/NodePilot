# NodePilot monitoring stack: Prometheus scraping the API host + Grafana with
# pre-provisioned dashboards.
#
# Prerequisites:
#   - NodePilot API running with OpenTelemetry:Enabled=true and
#     OpenTelemetry:Exporters:PrometheusScrape=true (exposes /metrics on port 5000)
#
# Setup:
#   cp .env.example .env   # then set a password
#   docker compose up -d
#
# Grafana:    http://localhost:3000  (admin / password from .env)
# Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      # Lets the container reach the NodePilot API running on the Docker host (Windows/macOS).
      # On Linux set NODEPILOT_HOST=<host-ip> in .env and reference it in prometheus.yml.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}"
      GF_AUTH_ANONYMOUS_ENABLED: "${GF_AUTH_ANONYMOUS_ENABLED:-false}"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data:
