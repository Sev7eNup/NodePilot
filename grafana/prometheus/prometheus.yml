global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nodepilot-api
    static_configs:
      # host.docker.internal resolves to the Docker host on Windows/macOS.
      # On Linux: replace with the host IP or set via extra_hosts in docker-compose.yml.
      - targets: ["host.docker.internal:5000"]
    metrics_path: /metrics
